apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: logviewer-dev
  labels:
    app: notification-service
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
        tier: backend
    spec:
      terminationGracePeriodSeconds: 5
      containers:
      - name: notification-service
        image: logviewer-dev/notification-service:latest
        imagePullPolicy: Never
        resources:
          requests:
            cpu: "50m"
            memory: "32Mi"
          limits:
            cpu: "200m"
            memory: "64Mi"
