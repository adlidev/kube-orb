apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: logviewer-dev
  labels:
    app: worker
    tier: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
        tier: worker
    spec:
      terminationGracePeriodSeconds: 5
      containers:
      - name: worker
        image: logviewer-dev/worker:latest
        imagePullPolicy: Never
        resources:
          requests:
            cpu: "50m"
            memory: "32Mi"
          limits:
            cpu: "200m"
            memory: "64Mi"
