apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: logviewer-dev
  labels:
    app: api-gateway
    tier: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
        tier: gateway
    spec:
      terminationGracePeriodSeconds: 5
      containers:
      - name: api-gateway
        image: logviewer-dev/api-gateway:latest
        imagePullPolicy: Never
        resources:
          requests:
            cpu: "50m"
            memory: "32Mi"
          limits:
            cpu: "200m"
            memory: "64Mi"
