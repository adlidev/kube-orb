apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: logviewer-dev
  labels:
    app: auth-service
    tier: auth
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
        tier: auth
    spec:
      terminationGracePeriodSeconds: 5
      containers:
      - name: auth-service
        image: logviewer-dev/auth-service:latest
        imagePullPolicy: Never
        resources:
          requests:
            cpu: "50m"
            memory: "32Mi"
          limits:
            cpu: "200m"
            memory: "64Mi"
